<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220" viewBox="0 0 220 220">
  <!-- Card background -->
  <rect x="0" y="0" width="220" height="220" rx="28" fill="#0F3460"/>

  <!-- Label -->
  <text x="24" y="36" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="400" fill="#FFFFFF" opacity="0.65">Sales</text>

  <!-- KPI value -->
  <text x="24" y="88" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="700" fill="#FFFFFF">47.3K</text>

  <!-- Arrow up -->
  <polygon points="24,110 33,96 42,110" fill="#4ADE80"/>

  <!-- Variance text -->
  <text x="48" y="110" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="600" fill="#4ADE80">+12.4%</text>

  <!-- Sparkline area fill -->
  <polygon
    points="20,178 55,165 90,170 125,150 160,136 200,112 200,192 20,192"
    fill="#FFFFFF" opacity="0.08"/>

  <!-- Sparkline line -->
  <polyline
    points="20,178 55,165 90,170 125,150 160,136 200,112"
    fill="none" stroke="#FFFFFF" stroke-width="3.5"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>

  <!-- Last point dot -->
  <circle cx="200" cy="112" r="5.5" fill="#FFFFFF" opacity="0.9"/>
</svg>